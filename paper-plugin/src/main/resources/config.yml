# BetterLogin Bridge – Paper Plugin Config

# Set to true for verbose logging useful when diagnosing connection issues.
debug: false

messages:
  # Shown when a premium player (or session player) auto-logs in.
  # Placeholder: {player} = username
  welcome: "&aWelcome, {player}!"

# ──────────────────────────────────────────────────────────────────────────────
# Dialog screen customization (Minecraft 1.21.6+ native dialogs)
# Colours accept named Adventure colours (BLACK, DARK_BLUE, DARK_GREEN,
# DARK_AQUA, DARK_RED, DARK_PURPLE, GOLD, GRAY, DARK_GRAY, BLUE, GREEN,
# AQUA, RED, LIGHT_PURPLE, YELLOW, WHITE) or hex codes (#RRGGBB).
# ──────────────────────────────────────────────────────────────────────────────
dialog:

  # ── Login dialog ────────────────────────────────────────────────────────────
  login:
    title: "Login"
    title-color: "GOLD"
    body: "Enter your password to continue."
    body-color: "GRAY"
    password-label: "Password"
    max-password-length: 50
    submit-button: "Login"
    submit-color: "GREEN"
    cancel-button: "Cancel"
    cancel-color: "RED"
    # Set to true to let players press Escape to dismiss the dialog.
    # WARNING: keeping this false is strongly recommended – otherwise players
    # can bypass the auth screen by pressing Escape.
    can-close-with-escape: false

  # ── Register dialog ──────────────────────────────────────────────────────────
  register:
    title: "Create Account"
    title-color: "GOLD"
    body: "Choose a password for your new account."
    body-color: "GRAY"
    password-label: "Password"
    max-password-length: 50
    submit-button: "Register"
    submit-color: "GREEN"
    cancel-button: "Cancel"
    cancel-color: "RED"
    can-close-with-escape: false

  # ── Fallback messages for clients older than 1.21.6 ─────────────────────────
  # These clients cannot see the native dialog and must type /login or /register.
  # Placeholder: {command} is replaced with the appropriate command string.
  fallback:
    no-support-message: "&eYour client does not support dialog screens. Please type {command} to authenticate."
    action-bar-message: "&eType {command} to authenticate"

# ──────────────────────────────────────────────────────────────────────────────
# Auth-display effects shown to players while they are authenticating.
# These appear in addition to the dialog screen and apply to all client versions.
# ──────────────────────────────────────────────────────────────────────────────
auth-display:

  # ── Title / subtitle ─────────────────────────────────────────────────────────
  title:
    enabled: true
    # Shown to players who already have an account
    login-title: "&6BetterLogin"
    login-subtitle: "&7Please enter your password..."
    # Shown to first-time players creating an account
    register-title: "&6BetterLogin"
    register-subtitle: "&7Please choose a password..."
    # Timing in ticks (20 ticks = 1 second).
    # Set 'stay' to a high number so the title persists until auth completes.
    fade-in: 10
    stay: 9999
    fade-out: 20

  # ── Boss bar ──────────────────────────────────────────────────────────────────
  boss-bar:
    enabled: true
    text: "&eAuthentication Required"
    # Color: PINK, BLUE, RED, GREEN, YELLOW, PURPLE, WHITE
    color: "YELLOW"
    # Style: PROGRESS, NOTCHED_6, NOTCHED_10, NOTCHED_12, NOTCHED_20
    style: "PROGRESS"

  # ── Action bar ────────────────────────────────────────────────────────────────
  action-bar:
    # Disabled by default as the dialog itself provides instructions.
    # Enable to show a persistent reminder below the dialog.
    enabled: false
    login-message: "&eEnter your password in the dialog above"
    register-message: "&eChoose a password in the dialog above"
