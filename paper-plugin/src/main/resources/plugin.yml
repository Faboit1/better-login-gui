name: BetterLoginBridge
version: '1.0.0'
main: com.betterlogin.paper.BetterLoginBridge
api-version: '1.21.6'
description: Paper bridge for the BetterLogin Velocity authentication plugin
authors:
  - BetterLogin
softDepend:
  - ViaVersion

commands:
  betterlogintest:
    description: BetterLogin Bridge admin and debug command
    usage: /betterlogintest <status|debug|resend|reload>
    aliases: [blt]
    permission: betterlogin.admin
    permission-message: You don't have permission to use this command.
  login:
    description: Authenticate with your password (for clients that do not support native dialogs)
    usage: /login <password>
  register:
    description: Register with a new password (for clients that do not support native dialogs)
    usage: /register <password>

permissions:
  betterlogin.admin:
    description: Allows use of BetterLogin admin commands on the Paper server
    default: op
