# BetterLogin – Velocity Proxy Plugin Config

# Set to true for verbose logging useful when diagnosing connection issues.
debug: false

# Names of backend servers as defined in velocity.toml
servers:
  # The main game server players land on after authenticating.
  # Leave blank (or remove this line) to automatically use the first server in
  # Velocity's attempt-connection-order list – no manual configuration needed.
  main: ""
  # Optional: a lightweight limbo/lobby server for unauthenticated players.
  # Leave blank to use the main server directly (Paper bridge will freeze the player).
  limbo: ""

# Console commands to run on the Paper backend after a successful event.
# Placeholders: {player} = username, {uuid} = player UUID
# Authentication messages are configured in AuthMe's config on the Paper server.
commands:
  on-login:
    # - "say {player} just logged in!"
  on-register:
    # - "lp user {player} parent set default"
