name: Build

on:
  push:
    branches: [ "main", "master", "copilot/**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Compile & package plugins
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build all subprojects
        run: ./gradlew build --no-daemon

      - name: Upload Velocity plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: velocity-plugin
          path: velocity-plugin/build/libs/velocity-plugin-*.jar
          if-no-files-found: error

      - name: Upload Paper bridge artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-plugin
          path: paper-plugin/build/libs/paper-plugin-*.jar
          if-no-files-found: error
